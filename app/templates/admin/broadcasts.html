<h1 class="text-2xl font-semibold mb-4">Создать рассылку</h1>
<textarea id="broadcastText" class="w-full border p-2"></textarea>
<button onclick="sendBroadcast()" class="mt-2 bg-green-600 text-white px-4 py-2 rounded">Отправить</button>
<script>
async function sendBroadcast() {
  const text = document.getElementById('broadcastText').value;
  try {
    await axios.post('/broadcast/', { message: text });
    alert('Рассылка отправлена');
  } catch (err) {
    console.error(err);
  }
}
</script>
