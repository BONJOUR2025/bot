<div class="bg-white rounded-xl shadow-md p-6 space-y-4">
  <h1 class="text-2xl font-semibold">Настройки</h1>
  <button onclick="resetStorage()" class="bg-red-500 text-white px-4 py-2 rounded">Сбросить user.json</button>
</div>
<script>
async function resetStorage() {
  try {
    await axios.post('/api/employees/reset');
    alert('user.json сброшен');
  } catch (err) {
    console.error(err);
  }
}
</script>
