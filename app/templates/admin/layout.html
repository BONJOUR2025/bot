<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админка</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900 dark:bg-gray-800 dark:text-gray-100">
  <header class="bg-white dark:bg-gray-900 shadow">
    <nav class="container mx-auto flex justify-between items-center p-4">
      <div class="flex gap-4">
        <a href="#" onclick="loadPage('/employees')" class="hover:text-blue-600">Сотрудники</a>
        <a href="#" onclick="loadPage('/payouts')" class="hover:text-blue-600">Выплаты</a>
        <a href="#" onclick="loadPage('/reports')" class="hover:text-blue-600">Отчёты</a>
        <a href="#" onclick="loadPage('/birthdays')" class="hover:text-blue-600">Дни рождения</a>
        <a href="#" onclick="loadPage('/broadcasts')" class="hover:text-blue-600">Рассылки</a>
        <a href="#" onclick="loadPage('/settings')" class="hover:text-blue-600">Настройки</a>
      </div>
      <button onclick="document.documentElement.classList.toggle('dark')" class="text-sm">🌙</button>
    </nav>
  </header>
  <main class="container mx-auto p-4">
    <div id="page-content"></div>
  </main>
  <script>
    function loadPage(url) {
      fetch(url)
        .then(res => {
          if (!res.ok) {
            throw new Error('Failed to load page: ' + res.status);
          }
          return res.text();
        })
        .then(html => {
          const container = document.getElementById('page-content');
          container.innerHTML = html;
          container.querySelectorAll('script').forEach(s => {
            const copy = document.createElement('script');
            if (s.src) copy.src = s.src; else copy.textContent = s.textContent;
            document.body.appendChild(copy);
            document.body.removeChild(copy);
          });
        })
        .catch(err => {
          const container = document.getElementById('page-content');
          container.innerHTML = '<p class="text-red-500">Ошибка загрузки страницы</p>';
          console.error(err);
        });
    }
    window.onload = () => loadPage('/employees');
  </script>
</body>
</html>
