<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Админка{% endblock %}</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900 dark:bg-gray-800 dark:text-gray-100">
  <header class="bg-white dark:bg-gray-900 shadow">
    <nav class="container mx-auto flex justify-between items-center p-4">
      <div class="flex gap-4">
        <a href="/" class="hover:text-blue-600">Сотрудники</a>
        <a href="/payouts" class="hover:text-blue-600">Выплаты</a>
        <a href="/reports" class="hover:text-blue-600">Отчёты</a>
        <a href="/birthdays" class="hover:text-blue-600">Дни рождения</a>
        <a href="/broadcasts" class="hover:text-blue-600">Рассылки</a>
        <a href="/settings" class="hover:text-blue-600">Настройки</a>
      </div>
      <button onclick="document.documentElement.classList.toggle('dark')" class="text-sm">🌙</button>
    </nav>
  </header>
  <main class="container mx-auto p-4">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
