<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Панель администратора</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
  <header class="bg-white shadow sticky top-0 z-10">
    <div class="container mx-auto flex justify-between items-center px-4 py-4">
      <h1 class="text-xl font-bold">Добро пожаловать, Администратор!</h1>
      <nav class="flex gap-4 text-sm">
        <a href="#" onclick="showTab('employees')">Сотрудники</a>
        <a href="#" onclick="showTab('payouts')">Выплаты</a>
        <a href="#" onclick="showTab('reports')">Отчёты</a>
        <a href="#" onclick="showTab('birthdays')">Дни рождения</a>
        <a href="#" onclick="showTab('broadcasts')">Рассылки</a>
        <a href="#" onclick="showTab('settings')">Настройки</a>
      </nav>
    </div>
  </header>

  <main class="container mx-auto px-4 py-6 space-y-8">
    <section id="employees" class="tab-section">
      <h2 class="text-lg font-semibold mb-4">Сотрудники</h2>
      <table class="min-w-full bg-white border" id="employee-table"></table>
      <form onsubmit="submitEmployee(); return false;" class="mt-4 space-y-2">
        <input id="name" class="border p-2 w-full" placeholder="ФИО" required />
        <input id="phone" class="border p-2 w-full" placeholder="Телефон" required />
        <input id="note" class="border p-2 w-full" placeholder="Примечание" />
        <input id="birthday" type="date" class="border p-2 w-full" placeholder="Дата рождения" />
        <input id="photo" type="file" class="border p-2 w-full" accept="image/*" />
        <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded">Создать</button>
      </form>
    </section>

    <section id="payouts" class="tab-section hidden">
      <h2 class="text-lg font-semibold mb-4">Выплаты</h2>
      <div id="payout-table">Загрузка...</div>
    </section>

    <section id="reports" class="tab-section hidden">
      <h2 class="text-lg font-semibold mb-4">Отчёты</h2>
      <button onclick="downloadReport()" class="bg-indigo-600 text-white px-4 py-2 rounded">📄 Скачать PDF</button>
    </section>

    <section id="birthdays" class="tab-section hidden">
      <h2 class="text-lg font-semibold mb-4">Ближайшие дни рождения</h2>
      <ul id="birthday-list" class="list-disc pl-5 text-sm"></ul>
    </section>

    <section id="broadcasts" class="tab-section hidden">
      <h2 class="text-lg font-semibold mb-4">Создать рассылку</h2>
      <textarea id="broadcastText" class="w-full border p-2"></textarea>
      <button onclick="sendBroadcast()" class="mt-2 bg-green-600 text-white px-4 py-2 rounded">Отправить</button>
    </section>

    <section id="settings" class="tab-section hidden">
      <h2 class="text-lg font-semibold mb-4">Настройки</h2>
      <button onclick="resetStorage()" class="bg-red-500 text-white px-4 py-2 rounded">Сбросить user.json</button>
    </section>
  </main>

  <footer class="text-center text-xs text-gray-400 py-4">
    Система администрирования · версия 1.0
  </footer>

  <script>
    function showTab(tab) {
      document.querySelectorAll('.tab-section').forEach(el => el.classList.add('hidden'));
      document.getElementById(tab).classList.remove('hidden');
    }

    async function loadEmployees() {
      try {
        const res = await axios.get("/employees/");
        const table = document.getElementById("employee-table");
        table.innerHTML = `
          <thead><tr class='bg-gray-200'>
            <th class='p-2'>ФИО</th><th>Телефон</th><th>Прим.</th><th>Дата рождения</th><th>Фото</th><th>Действия</th>
          </tr></thead>
          <tbody>
            ${res.data.map(e => `
              <tr class='border-t'>
                <td class='p-2'>${e.name}</td>
                <td>${e.phone}</td>
                <td>${e.note || ''}</td>
                <td>${e.birthday || ''}</td>
                <td>${e.photo_url ? `<img src="${e.photo_url}" class='h-10'>` : ''}</td>
                <td>
                  <button onclick="deleteEmployee('${e.id}')" class='text-red-500'>Удалить</button>
                </td>
              </tr>
            `).join('')}
          </tbody>`;
      } catch (err) {
        console.error(err);
      }
    }

    async function submitEmployee() {
      const form = new FormData();
      form.append("name", document.getElementById("name").value);
      form.append("phone", document.getElementById("phone").value);
      form.append("note", document.getElementById("note").value);
      form.append("birthday", document.getElementById("birthday").value);
      const file = document.getElementById("photo").files[0];
      try {
        const res = await axios.post("/employees/", Object.fromEntries(form), {
          headers: { 'Content-Type': 'application/json' }
        });
        const id = res.data.id;
        if (file) {
          const photoForm = new FormData();
          photoForm.append("file", file);
          await axios.post(`/employees/${id}/photo`, photoForm);
        }
        await loadEmployees();
        alert("Сотрудник создан");
      } catch (err) {
        console.error(err);
      }
    }

    async function deleteEmployee(id) {
      try {
        await axios.delete(`/employees/${id}`);
        await loadEmployees();
      } catch (err) {
        console.error(err);
      }
    }

    async function sendBroadcast() {
      const text = document.getElementById("broadcastText").value;
      try {
        await axios.post("/broadcast/", { message: text });
        alert("Рассылка отправлена");
      } catch (err) {
        console.error(err);
      }
    }

    async function downloadReport() {
      try {
        const res = await axios.get("/reports/pdf", { responseType: 'blob' });
        const url = window.URL.createObjectURL(new Blob([res.data]));
        const link = document.createElement('a');
        link.href = url;
        link.setAttribute('download', 'report.pdf');
        document.body.appendChild(link);
        link.click();
      } catch (err) {
        console.error(err);
      }
    }

    async function resetStorage() {
      try {
        await axios.post("/employees/reset");
        await loadEmployees();
        alert("user.json сброшен");
      } catch (err) {
        console.error(err);
      }
    }

    async function loadBirthdays() {
      try {
        const res = await axios.get("/employees/birthdays");
        const list = document.getElementById("birthday-list");
        list.innerHTML = res.data.map(e => `<li>${e.name} – ${e.birthday}</li>`).join('');
      } catch (err) {
        console.error(err);
      }
    }

    window.onload = () => {
      loadEmployees();
      loadBirthdays();
    }
  </script>
</body>
</html>
